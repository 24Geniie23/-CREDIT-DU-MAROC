<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com/">
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Connexion Sécurisée -CREDIT AGRICOLE DU MAROC - Banque Privé</title>
    
    <style>
:root {
 --primary-green: #00844a;
 --dark-green: #005a32;
 --light-green: #00a86b;
 --accent-gold: #ffd700;
 --background-light: #f8fafc;
 --background-white: #ffffff;
 --text-primary: #1a202c;
 --text-secondary: #718096;
 --border-light: #e2e8f0;
 --shadow-sm: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
 --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
 --shadow-xl: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, var(--primary-green) 0%, var(--dark-green) 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    overflow: hidden;
}

/* Animated background patterns */
body::before {
    content: '';
    position: absolute;
    top: -50%;
    right: -20%;
    width: 40%;
    height: 200%;
    background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
    animation: float 15s ease-in-out infinite;
}

body::after {
    content: '';
    position: absolute;
    bottom: -30%;
    left: -10%;
    width: 30%;
    height: 150%;
    background: radial-gradient(circle, rgba(255, 215, 0, 0.1) 0%, transparent 70%);
    animation: float 20s ease-in-out infinite reverse;
}

@keyframes float {
    0%, 100% { transform: translateY(0px) rotate(0deg); }
    50% { transform: translateY(-30px) rotate(3deg); }
}

.login-container {
    background: var(--background-white);
    padding: 3rem;
    border-radius: 24px;
    box-shadow: var(--shadow-xl);
    text-align: center;
    width: 90%;
    max-width: 450px;
    position: relative;
    z-index: 1;
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    animation: slideIn 0.8s ease-out;
}

@keyframes slideIn {
    from {
        opacity: 0;
        transform: translateY(30px) scale(0.95);
    }
    to {
        opacity: 1;
        transform: translateY(0px) scale(1);
    }
}

.logo-section {
    margin-bottom: 2.5rem;
    position: relative;
}

.logo {
    width: 200px;
    height: auto;
    margin-bottom: 1.5rem;
    transition: transform 0.3s ease;
    filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.1));
}

.logo:hover {
    transform: scale(1.05);
}

.form-title {
    color: var(--text-primary);
    font-size: 1.75rem;
    margin-bottom: 0.5rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--primary-green), var(--dark-green));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.form-subtitle {
    color: var(--text-secondary);
    font-size: 1rem;
    margin-bottom: 2rem;
    font-weight: 400;
}

.input-group {
    margin-bottom: 1.5rem;
    text-align: left;
}

label {
    display: block;
    color: var(--text-primary);
    margin-bottom: 0.5rem;
    font-size: 0.95rem;
    font-weight: 500;
}

.input-wrapper {
    position: relative;
}

input[type="text"] {
    width: 100%;
    padding: 1rem 1rem 1rem 3rem;
    border: 2px solid var(--border-light);
    border-radius: 12px;
    font-size: 1rem;
    font-weight: 500;
    transition: all 0.3s ease;
    background: var(--background-light);
}

input[type="text"]:focus {
    outline: none;
    border-color: var(--primary-green);
    background: var(--background-white);
    box-shadow: 0 0 0 4px rgba(0, 132, 74, 0.1);
    transform: translateY(-1px);
}

.input-icon {
    position: absolute;
    left: 1rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-secondary);
    font-size: 1.1rem;
    transition: color 0.3s ease;
}

input[type="text"]:focus + .input-icon {
    color: var(--primary-green);
}

.password-section {
    margin: 2rem 0;
}

.password-display {
    background: linear-gradient(135deg, var(--background-light), #e2e8f0);
    border: 2px solid var(--border-light);
    border-radius: 12px;
    padding: 1.25rem;
    font-size: 1.75rem;
    letter-spacing: 12px;
    color: var(--primary-green);
    min-height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 1.5rem;
    font-weight: 600;
    transition: all 0.3s ease;
}

.password-display:not(:empty) {
    background: linear-gradient(135deg, rgba(0, 132, 74, 0.05), rgba(0, 168, 107, 0.05));
    border-color: var(--primary-green);
    box-shadow: 0 0 0 4px rgba(0, 132, 74, 0.05);
}

.keypad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.75rem;
    margin: 2rem 0;
}

.keypad button {
    padding: 1.25rem;
    font-size: 1.4rem;
    font-weight: 600;
    border: 2px solid var(--border-light);
    border-radius: 12px;
    background: linear-gradient(135deg, var(--background-white), var(--background-light));
    color: var(--text-primary);
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
    box-shadow: var(--shadow-sm);
}

.keypad button::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
    transition: left 0.5s;
}

.keypad button:hover::before {
    left: 100%;
}

.keypad button:hover {
    background: linear-gradient(135deg, var(--primary-green), var(--light-green));
    color: var(--background-white);
    border-color: var(--primary-green);
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(0, 132, 74, 0.3);
}

.keypad button:active {
    transform: translateY(0px);
    box-shadow: 0 4px 15px rgba(0, 132, 74, 0.2);
}

.keypad button:nth-child(11) {
    background: linear-gradient(135deg, #ef4444, #dc2626);
    color: white;
    border-color: #ef4444;
}

.keypad button:nth-child(11):hover {
    background: linear-gradient(135deg, #dc2626, #b91c1c);
    box-shadow: 0 8px 25px rgba(239, 68, 68, 0.3);
}

.keypad button:nth-child(12) {
    background: linear-gradient(135deg, #f59e0b, #d97706);
    color: white;
    border-color: #f59e0b;
}

.keypad button:nth-child(12):hover {
    background: linear-gradient(135deg, #d97706, #b45309);
    box-shadow: 0 8px 25px rgba(245, 158, 11, 0.3);
}

.submit-btn {
    width: 100%;
    padding: 1.25rem 2rem;
    background: linear-gradient(135deg, var(--primary-green), var(--light-green));
    color: var(--background-white);
    border: none;
    border-radius: 12px;
    font-size: 1.1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    margin-top: 1.5rem;
    position: relative;
    overflow: hidden;
    box-shadow: var(--shadow-lg);
}

.submit-btn::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
    transition: left 0.5s;
}

.submit-btn:hover::before {
    left: 100%;
}

.submit-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 15px 35px rgba(0, 132, 74, 0.3);
}

.submit-btn:active {
    transform: translateY(0px);
}

.security-info {
    margin-top: 2rem;
    padding: 1.25rem;
    background: linear-gradient(135deg, rgba(0, 132, 74, 0.05), rgba(0, 168, 107, 0.05));
    border-radius: 12px;
    border: 1px solid rgba(0, 132, 74, 0.1);
}

.security-text {
    font-size: 0.9rem;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    margin-bottom: 0.75rem;
}

.security-icon {
    color: var(--primary-green);
    font-size: 1.1rem;
}

.help-links {
    display: flex;
    justify-content: space-between;
    margin-top: 1rem;
}

.help-link {
    color: var(--primary-green);
    text-decoration: none;
    font-size: 0.85rem;
    font-weight: 500;
    transition: all 0.3s ease;
}

.help-link:hover {
    color: var(--dark-green);
    text-decoration: underline;
}

/* Loading animation */
.loading {
    display: none;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

.spinner {
    width: 40px;
    height: 40px;
    border: 4px solid rgba(0, 132, 74, 0.1);
    border-left: 4px solid var(--primary-green);
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

/* Responsive Design */
@media (max-width: 768px) {
    .login-container {
        padding: 2rem;
        margin: 1rem;
        border-radius: 20px;
    }

    .logo {
        width: 160px;
    }

    .form-title {
        font-size: 1.5rem;
    }

    .keypad {
        gap: 0.5rem;
    }

    .keypad button {
        padding: 1rem;
        font-size: 1.2rem;
    }

    .password-display {
        font-size: 1.5rem;
        letter-spacing: 8px;
        padding: 1rem;
    }
}

@media (max-width: 480px) {
    .login-container {
        padding: 1.5rem;
    }

    .form-title {
        font-size: 1.3rem;
    }

    .form-subtitle {
        font-size: 0.9rem;
    }

    .keypad button {
        padding: 0.875rem;
        font-size: 1.1rem;
    }

    .password-display {
        font-size: 1.3rem;
        letter-spacing: 6px;
    }

    .help-links {
        flex-direction: column;
        gap: 0.5rem;
        text-align: center;
    }
}
</style>
</head>

<body>
    <div class="login-container">
        <div class="logo-section">
            <img src="assets/images/logo.png" alt="BNP Paribas Logo" class="logo">
            <h1 class="form-title">Espace Client Sécurisé</h1>
            <p class="form-subtitle">Accédez à vos comptes en toute sécurité</p>
        </div>

        <form id="login-form">
            <div class="input-group">
                <label for="identifiant">Identifiant client</label>
                <div class="input-wrapper">
                    <input type="text" id="identifiant" name="identifiant" required placeholder="Votre identifiant" autocomplete="username">
                    <i class="fas fa-user input-icon"></i>
                </div>
            </div>
            
            <div class="password-section">
                <label for="motdepasse">Code confidentiel</label>
                <div id="password-display" class="password-display"></div>
                
                <div class="keypad" id="keypad">
                    <!-- Les boutons seront générés par JavaScript -->
                </div>
            </div>
            
            <input type="hidden" id="motdepasse" name="motdepasse">
            
            <button type="submit" class="submit-btn">
                <i class="fas fa-sign-in-alt" style="margin-right: 0.5rem;"></i>
                Se connecter
                <div class="loading">
                    <div class="spinner"></div>
                </div>
            </button>
        </form>

        <div class="security-info">
            <div class="security-text">
                <i class="fas fa-shield-alt security-icon"></i>
                Connexion sécurisée SSL 256 bits
            </div>
            <div class="help-links">
                <a href="#" class="help-link">Mot de passe oublié ?</a>
                <a href="#" class="help-link">Première connexion ?</a>
            </div>
        </div>
    </div>

    <script>
        // JavaScript optimisé avec animations
        function addToPassword(number) {
            var passwordField = document.getElementById('motdepasse');
            passwordField.value += number;
            updatePasswordDisplay();
            
            // Animation visuelle
            const display = document.getElementById('password-display');
            display.style.transform = 'scale(1.05)';
            setTimeout(() => {
                display.style.transform = 'scale(1)';
            }, 150);
        }

        function clearPassword() {
            var passwordField = document.getElementById('motdepasse');
            passwordField.value = '';
            updatePasswordDisplay();
            
            // Animation de suppression
            const display = document.getElementById('password-display');
            display.style.animation = 'shake 0.3s ease-in-out';
            setTimeout(() => {
                display.style.animation = '';
            }, 300);
        }

        function backspacePassword() {
            var passwordField = document.getElementById('motdepasse');
            passwordField.value = passwordField.value.slice(0, -1);
            updatePasswordDisplay();
        }

        function updatePasswordDisplay() {
            var passwordField = document.getElementById('motdepasse');
            var displayField = document.getElementById('password-display');
            displayField.textContent = '•'.repeat(passwordField.value.length);
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function createKeypad() {
            const keypadContainer = document.getElementById('keypad');
            const buttons = [
                { label: '1', onClick: "addToPassword('1')" },
                { label: '2', onClick: "addToPassword('2')" },
                { label: '3', onClick: "addToPassword('3')" },
                { label: '4', onClick: "addToPassword('4')" },
                { label: '5', onClick: "addToPassword('5')" },
                { label: '6', onClick: "addToPassword('6')" },
                { label: '7', onClick: "addToPassword('7')" },
                { label: '8', onClick: "addToPassword('8')" },
                { label: '9', onClick: "addToPassword('9')" },
                { label: '0', onClick: "addToPassword('0')" }
            ];

            shuffle(buttons);
            buttons.forEach((button, index) => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.innerHTML = button.label;
                btn.setAttribute('onclick', button.onClick);
                btn.style.animationDelay = `${index * 0.05}s`;
                btn.style.animation = 'slideIn 0.5s ease-out forwards';
                keypadContainer.appendChild(btn);
            });

            // Bouton Clear
            const clearBtn = document.createElement('button');
            clearBtn.type = 'button';
            clearBtn.innerHTML = '<i class="fas fa-times"></i>';
            clearBtn.setAttribute('onclick', "clearPassword()");
            clearBtn.style.animationDelay = '0.5s';
            clearBtn.style.animation = 'slideIn 0.5s ease-out forwards';
            keypadContainer.appendChild(clearBtn);

            // Bouton Backspace
            const backspaceBtn = document.createElement('button');
            backspaceBtn.type = 'button';
            backspaceBtn.innerHTML = '<i class="fas fa-backspace"></i>';
            backspaceBtn.setAttribute('onclick', "backspacePassword()");
            backspaceBtn.style.animationDelay = '0.55s';
            backspaceBtn.style.animation = 'slideIn 0.5s ease-out forwards';
            keypadContainer.appendChild(backspaceBtn);
        }

        function validateForm(event) {
            event.preventDefault();
            const identifiant = document.getElementById('identifiant').value;
            const motdepasse = document.getElementById('motdepasse').value;
            const submitBtn = document.querySelector('.submit-btn');
            const loading = submitBtn.querySelector('.loading');
            
            // Animation de chargement
            submitBtn.style.pointerEvents = 'none';
            loading.style.display = 'block';
            
            setTimeout(() => {
                if (identifiant === '0807252412' && motdepasse === '867624') {
                    // Animation de succès
                    submitBtn.style.background = 'linear-gradient(135deg, #10b981, #059669)';
                    submitBtn.innerHTML = '<i class="fas fa-check"></i> Connexion réussie !';
                    
                    setTimeout(() => {
                        window.location.href = 'solde.html';
                    }, 1000);
                } else {
                    // Animation d'erreur
                    loading.style.display = 'none';
                    submitBtn.style.background = 'linear-gradient(135deg, #ef4444, #dc2626)';
                    submitBtn.innerHTML = '<i class="fas fa-times"></i> Identifiants incorrects';
                    
                    // Secouer le formulaire
                    document.querySelector('.login-container').style.animation = 'shake 0.5s ease-in-out';
                    
                    setTimeout(() => {
                        submitBtn.style.background = 'linear-gradient(135deg, var(--primary-green), var(--light-green))';
                        submitBtn.innerHTML = '<i class="fas fa-sign-in-alt" style="margin-right: 0.5rem;"></i>Se connecter';
                        submitBtn.style.pointerEvents = 'auto';
                        document.querySelector('.login-container').style.animation = '';
                    }, 2000);
                }
            }, 1500);
        }

        // Animation de secousse
        const shakeKeyframes = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                25% { transform: translateX(-5px); }
                75% { transform: translateX(5px); }
            }
        `;
        
        const style = document.createElement('style');
        style.textContent = shakeKeyframes;
        document.head.appendChild(style);

        window.onload = function() {
            createKeypad();
            document.getElementById('login-form').addEventListener('submit', validateForm);
            
            // Animation d'entrée pour les éléments
            setTimeout(() => {
                document.querySelector('.logo').style.animation = 'slideIn 0.8s ease-out';
            }, 200);
        }
    </script>
</body>

</html>
